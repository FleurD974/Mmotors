{% extends 'base.html' %}

{% block content %}
<div class="container">
    <form method="POST">
        {% if form.non_field_errors %}
            <div class="alert alert-info message" role="alert">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {% csrf_token %}
            {{ form }}
            <button type="submit" class="w-100 btn btn-lg btn-primary">Modifier</button>
    </form>

</div>
{% endblock %}
