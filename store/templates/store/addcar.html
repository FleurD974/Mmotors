{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Ajout d'une voiture</h1>
    <form method="POST">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="alert alert-info message" role="alert">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}
            {{ form }}
            <button type="submit" class="w-100 btn btn-lg btn-primary">Ajouter</button>
    </form>
</div>
{% endblock %}
